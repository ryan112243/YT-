name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: temp-project/package-lock.json
      - name: Install
        run: npm ci
        working-directory: temp-project
      - name: Build
        run: npm run build
        working-directory: temp-project
      - name: SPA fallback
        run: cp dist/index.html dist/404.html
        working-directory: temp-project
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp-project/dist
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
